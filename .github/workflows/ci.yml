name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main
      - staging

# Moindre privilège : lecture seule par défaut, surcharge par job si besoin.
permissions:
  contents: read

env:
  PNPM_VERSION: "10.30.3"
  NODE_VERSION: "22"

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

  # ── 2. Typecheck ─────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm typecheck

  # ── 3. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      docker:
        image: docker:dind
        # --privileged requis : Testcontainers (Docker-in-Docker) — CONTRACT-010 traçabilité
        options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm test

      - name: Build tools/ci
        run: pnpm --filter @sigfa/ci run build

      - name: Run coverage ratchet
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          node --input-type=module << 'EOF'
          import { runRatchet, mergeIstanbulReports } from './tools/ci/dist/coverage-ratchet.js';
          import { glob } from 'node:fs/promises';
          import { readFileSync } from 'node:fs';

          const reports = [];
          for await (const f of glob('**/coverage/coverage-final.json', { ignore: ['**/node_modules/**'] })) {
            reports.push(JSON.parse(readFileSync(f, 'utf-8')));
          }

          const result = await runRatchet({
            baselinePath: 'coverage-baseline.json',
            coverageReports: reports,
            context: process.env.GITHUB_EVENT_NAME === 'pull_request' ? 'pull_request' : 'push',
            newFiles: [],
            artifactDir: '.',
          });

          if (result.exitCode !== 0) {
            console.error(result.message);
            process.exit(1);
          }
          console.log(result.message);
          EOF

      - name: Upload coverage baseline artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-baseline
          path: coverage-baseline.json
          if-no-files-found: ignore

  # ── 4. Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm build

  # ── 5. Contract Diff ──────────────────────────────────────────────────────────
  contract-diff:
    name: Contract Diff (oasdiff)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect changed openapi files
        id: openapi-changed
        run: |
          if git diff --name-only origin/main HEAD -- 'packages/contracts/openapi/**' | grep -q '.'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Contract breaking-change check (PR only, oasdiff)
        if: github.event_name == 'pull_request' && steps.openapi-changed.outputs.changed == 'true'
        working-directory: packages/contracts
        run: |
          # Récupérer origin/main pour la comparaison oasdiff
          git fetch origin main --depth=1 2>/dev/null || true
          # Collecter les fichiers openapi modifiés vs origin/main dans un tableau
          mapfile -t CHANGED_FILES < <(git diff --name-only origin/main HEAD -- 'openapi/*.yaml' 2>/dev/null || true)
          if [ "${#CHANGED_FILES[@]}" -eq 0 ]; then
            echo "Aucun fichier openapi/*.yaml modifié vs origin/main."
            exit 0
          fi
          echo "Fichiers modifiés : ${CHANGED_FILES[*]}"
          bash scripts/contract-diff.sh "${CHANGED_FILES[@]}"

      - name: Bundle openapi pour check-generated-sync
        run: pnpm --filter @sigfa/contracts run bundle

      - name: Check generated sync
        working-directory: packages/contracts
        run: bash scripts/check-generated-sync.sh

  # ── 6. Contract Runtime (Prism + Schemathesis) ───────────────────────────────
  #
  # Tests runtime lourds isolés du gate de couverture (T8 contention CI).
  # Raison : mock-prism.test.ts spawne 7 serveurs Prism + 1 conteneur Docker
  # Schemathesis. Sur un runner 2 cœurs, la contention provoque des timeouts
  # intermittents ("Port 4012 not ready") dans le gate rapide.
  # Séparation propre : test:runtime sans --coverage, job dédié avec Docker dispo.
  # Ref : .claude/lessons/etat-local-residuel-masque-la-ci.md
  contract-runtime:
    name: Contract Runtime (Prism + Schemathesis)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Turborepo cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build contracts (bundles requis par Prism)
        run: pnpm --filter @sigfa/contracts run bundle

      - name: Run contract runtime tests (Prism + Schemathesis)
        run: pnpm --filter @sigfa/contracts run test:runtime
