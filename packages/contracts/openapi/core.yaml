        serviceTime:
          type: integer
          minimum: 0
          description: Temps de service en secondes (SERVING → DONE)
        closedAt:
          type: string
          format: date-time

    CreateTicketRequest:
      type: object
      description: |
        Requête d'émission d'un ticket. L'`agencyId` est dérivé du JWT de l'appelant
        (kiosque ou agent) — il ne doit pas être fourni dans le corps.

        **Émission par opération (MODEL-CONTRACT-A, additif)** : `operationId` est
        **optionnel**. S'il est fourni, le serveur dérive `serviceId = operation.serviceId` ;
        si `serviceId` est aussi fourni et incohérent → 422 `SERVICE_OPERATION_MISMATCH`.
        `serviceId` **reste requis** (rétrocompat totale) : en l'absence d'`operationId`,
        il est utilisé tel quel.

        **Ciblage conseiller (MODEL-CONTRACT-B, additif — D6)** : `targetManagerId` est
        **optionnel**. S'il est fourni, le ticket rejoint la file personnelle du conseiller
        (priorité absolue, routage mono-agent — logique en API-B). `serviceId` reste requis
        (l'opération/service reste indicatif). `targetManagerId` inconnu / non-conseiller /
        hors agence → 404 `RELATIONSHIP_MANAGER_NOT_FOUND`.
      required:
        - serviceId
        - channel
      additionalProperties: false
      properties:
        serviceId:
          type: string
          format: uuid
        operationId:
          type: string
          format: uuid
          description: |
            Opération choisie (optionnel, additif). Si fourni, le serveur dérive
            `serviceId = operation.serviceId`. Incohérence serviceId/operationId → 422
            `SERVICE_OPERATION_MISMATCH`.
        targetManagerId:
          type: string
          format: uuid
          description: |
            Conseiller ciblé (optionnel, additif — MODEL-CONTRACT-B/D6). Si fourni, le ticket
            rejoint la file personnelle de ce conseiller. Inconnu/non-conseiller/hors agence →
            404 `RELATIONSHIP_MANAGER_NOT_FOUND`.
        channel:
          $ref: "#/components/schemas/TicketChannel"
        phoneNumber:
          type: string
          pattern: "^\\+[1-9]\\d{6,14}$"
          description: "Numéro de téléphone E.164 pour les notifications SMS/WhatsApp (ex: +2250700000001)"
          example: "+2250700000001"
        priority:
          $ref: "#/components/schemas/TicketPriority"

    CallTicketRequest:
      type: object
      required:
        - counterId
      properties:
        counterId:
          type: string
          format: uuid

    CloseTicketRequest:
      type: object
      properties:
        notes:
          type: string
          maxLength: 1000

    TransferTicketRequest:
      type: object
      required:
        - targetServiceId
      properties:
        targetServiceId:
          type: string
          format: uuid
        targetCounterId:
          type: string
          format: uuid
        reason:
          type: string
          maxLength: 500

    # ── Sync ─────────────────────────────────────────────────────────────────

    TicketSyncItem:
      type: object
      description: |
        Item d'un batch de synchronisation hors-ligne. L'`agencyId` est dérivé
        du JWT de la borne — il ne doit pas être fourni dans chaque item.
      required:
        - localUuid
        - serviceId
        - channel
        - createdOfflineAt
      additionalProperties: false
      properties:
        localUuid:
          type: string
          format: uuid
          description: UUID généré côté client pour l'idempotence
        serviceId:
          type: string
          format: uuid
        operationId:
          type: string
          format: uuid
          description: |
            Opération choisie (optionnel, additif — offline-sync D8). Si fourni, le serveur
            dérive `serviceId = operation.serviceId` ; incohérence → skip
            `SERVICE_OPERATION_MISMATCH`. `serviceId` reste requis (rétrocompat).
        targetManagerId:
          type: string
          format: uuid
          description: |
            Conseiller ciblé (optionnel, additif — MODEL-CONTRACT-B/D6). Inconnu/non-conseiller/
            hors agence → skip `RELATIONSHIP_MANAGER_NOT_FOUND`. `serviceId` reste requis.
        channel:
          $ref: "#/components/schemas/TicketChannel"
        createdOfflineAt:
          type: string
          format: date-time
        priority:
          $ref: "#/components/schemas/TicketPriority"

    TicketSyncRequest:
      type: object
      required:
        - tickets
      properties:
        tickets:
          type: array
          items:
            $ref: "#/components/schemas/TicketSyncItem"
          minItems: 1
          maxItems: 100
          description: Batch de tickets offline — maximum 100 par appel

    SyncedTicket:
      type: object
      required:
        - localUuid
        - serverId
        - number
      properties:
        localUuid:
          type: string
          format: uuid
        serverId:
          type: string
          format: uuid
        number:
          type: string
          description: Numéro définitif côté serveur (résolution local → serveur)
          example: "A100"

    SkippedTicket:
      type: object
      required:
        - localUuid
        - reason
      properties:
        localUuid:
          type: string
          format: uuid
        reason:
          type: string
          description: Raison du rejet (code d'erreur)
          example: "SERVICE_NOT_FOUND"

    TicketSyncResponse:
      type: object
      required:
        - synced
        - skipped
      properties:
        synced:
          type: array
          items:
            $ref: "#/components/schemas/SyncedTicket"
          description: Tickets synchronisés avec succès (résolution localUuid → serverId + number)
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/SkippedTicket"
          description: Tickets ignorés avec la raison

  # ── Responses partagées ───────────────────────────────────────────────────────
  responses:
    BadRequest:
      description: Requête invalide (validation échouée ou en-tête obligatoire absent)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: BAD_REQUEST
              message: "Le corps de la requête est invalide."
              details:
                field: "email"
                issue: "Format d'email invalide."

    Unauthorized:
      description: Token JWT absent, expiré ou invalide
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNAUTHORIZED
              message: "Token d'accès absent ou expiré."

    Forbidden:
      description: Permissions insuffisantes pour cette opération
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: FORBIDDEN
              message: "Vous n'avez pas les permissions nécessaires."

    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: NOT_FOUND
              message: "La ressource demandée est introuvable."

    Conflict:
      description: Conflit (ressource existante ou transition illégale)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: CONFLICT
              message: "Un conflit a été détecté."

    UnprocessableEntity:
      description: Entité non traitable (données sémantiquement invalides)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: UNPROCESSABLE_ENTITY
              message: "Les données fournies sont sémantiquement invalides."

    TooManyRequests:
      description: Trop de requêtes — limite de débit atteinte
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: TOO_MANY_REQUESTS
              message: "Limite de débit atteinte. Réessayez ultérieurement."

    InternalServerError:
      description: Erreur interne du serveur
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: "Une erreur interne s'est produite."
