        - number
        - status
        - serviceId
        - agencyId
        - channel
        - position
        - estimatedWaitMinutes
        - trackingId
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        number:
          type: string
          description: "Numéro séquentiel brut (ex: A099)"
          example: "A099"
        displayNumber:
          type: string
          description: |
            Numéro d'affichage au format `{code}-{NNN}` (code service + séquence 3 chiffres).
          example: "OC-099"
        status:
          $ref: "#/components/schemas/TicketStatus"
        priority:
          $ref: "#/components/schemas/TicketPriority"
        serviceId:
          type: string
          format: uuid
        operationId:
          type: ["string", "null"]
          format: uuid
          description: |
            Opération résolue du ticket (additif, nullable). `null` si émis par service seul.
        targetManagerId:
          type: ["string", "null"]
          format: uuid
          description: |
            Conseiller ciblé par le ticket (additif, nullable — MODEL-CONTRACT-B/D6).
            `null` si aucun conseiller ciblé.
        agencyId:
          type: string
          format: uuid
        channel:
          $ref: "#/components/schemas/TicketChannel"
        position:
          type: integer
          minimum: 0
