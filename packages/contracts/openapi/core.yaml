          format: date-time
        servedAt:
          type: string
          format: date-time
        closedAt:
          type: string
          format: date-time
        noShowAt:
          type: string
          format: date-time
        abandonedAt:
          type: string
          format: date-time
        transferredAt:
          type: string
          format: date-time
        transferredToServiceId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    TicketCreatedResponse:
      type: object
      description: Réponse à POST /tickets — ticket créé en état WAITING
      required:
