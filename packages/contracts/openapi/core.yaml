  # ──────────────────────────────────────────────────────────────────────────────
  # TICKETS — machine à états
  # WAITING → CALLED → SERVING → DONE | NO_SHOW | ABANDONED | TRANSFERRED
  # ──────────────────────────────────────────────────────────────────────────────
  /tickets:
    post:
      tags: [Tickets]
      summary: "† Émettre un ticket (mutation critique — X-Idempotency-Key requis)"
      description: |
        Crée un nouveau ticket dans l'état **WAITING**.
        Le canal d'émission (`channel`) est fourni par l'appelant.

        **Mutation critique** : l'en-tête `X-Idempotency-Key` est obligatoire.
        Même clé + même payload = même réponse pendant 24 h.
        Même clé + payload différent → 409 `IDEMPOTENCY_CONFLICT`.

        Les variantes multi-canal détaillées (borne, QR, WhatsApp…) sont dans
        CONTRACT-003.

        **Résolution par opération (MODEL-CONTRACT-A, additif)** : `operationId` est
        **optionnel**. S'il est fourni, le serveur dérive `serviceId = operation.serviceId` ;
        si `serviceId` est aussi fourni et **incohérent** avec l'opération → 422
        `SERVICE_OPERATION_MISMATCH`. `operationId` inconnu/inactif/hors agence → 404
        `OPERATION_NOT_FOUND`. Si `operationId` est absent, `serviceId` est utilisé tel quel
        (comportement F2/F3 inchangé).
      x-tenant-scope: agency
      x-required-role: AGENT
      parameters:
        - $ref: "#/components/parameters/IdempotencyKeyParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
            examples:
              par_service:
                summary: Émission par service (rétrocompat — operationId absent)
                value:
                  serviceId: "77777777-7777-4777-a777-777777777777"
                  channel: KIOSK
                  phoneNumber: "+2250700000001"
                  priority: STANDARD
              par_operation:
                summary: Émission par opération (serviceId dérivé de l'opération)
                value:
                  serviceId: "77777777-7777-4777-a777-777777777777"
                  operationId: "a1a1a1a1-a1a1-4a1a-aa1a-a1a1a1a1a1a1"
                  channel: KIOSK
                  priority: STANDARD
      responses:
        "201":
          description: Ticket créé en état WAITING
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketCreatedResponse"
              example:
                id: "00000000-0000-4000-a000-000000000000"
                number: "A099"
                displayNumber: "OC-099"
                status: WAITING
                priority: STANDARD
                serviceId: "77777777-7777-4777-a777-777777777777"
                agencyId: "33333333-3333-4333-a333-333333333333"
                channel: KIOSK
                position: 13
                estimatedWaitMinutes: 26
                trackingId: "tck_V9k2mXpLqRwZsYn8fBjH3"
                createdAt: "2026-07-11T09:00:00Z"
