    # ── Operation (enfant d'un service — MODEL-CONTRACT-A) ─────────────────────

    Operation:
      type: object
      description: |
        Opération = action précise proposée dans le cadre d'un service (enfant du service).
        **Aucune notion de priorité** (D4) : la priorité reste l'enum porteur `TicketPriority`
        du ticket. `slaMinutes` est **nullable** : SLA résolu = `operation.slaMinutes ?? service.slaMinutes`.
      required:
        - id
        - serviceId
        - code
        - name
        - displayOrder
        - isActive
      properties:
        id:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
          description: Identifiant du service parent
        code:
          type: string
          pattern: "^[A-Z0-9]{2,6}$"
          description: |
            Code mnémotechnique de l'opération — 2 à 6 caractères A-Z/0-9, **unique par service**.
          example: DEP
        name:
          type: string
        slaMinutes:
          type: ["integer", "null"]
          minimum: 1
          description: |
            SLA propre à l'opération, en minutes. **Nullable** : si null, hérite du SLA du service (D4).
        displayOrder:
          type: integer
          minimum: 0
          description: Ordre d'affichage de l'opération dans la grille borne
        isActive:
          type: boolean
        iconKey:
          type: string
          description: Clé d'icône optionnelle (mapping composant ServiceIcon — D10)

    CreateOperationRequest:
      type: object
      description: |
        Requête de création d'une opération. Le `serviceId` est dérivé du path
        (`/services/{serviceId}/operations`) — il ne doit pas être fourni dans le corps.
      required:
        - code
        - name
        - displayOrder
      additionalProperties: false
      properties:
        code:
          type: string
          pattern: "^[A-Z0-9]{2,6}$"
          description: Code unique par service (2–6 caractères A-Z/0-9).
          example: DEP
        name:
          type: string
        slaMinutes:
          type: ["integer", "null"]
          minimum: 1
          description: SLA propre (minutes). Null ou absent → hérite du service (D4).
        displayOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
          default: true
        iconKey:
          type: string

    UpdateOperationRequest:
      type: object
      description: Mise à jour partielle d'une opération. Tous les champs sont optionnels.
      additionalProperties: false
      properties:
        code:
          type: string
          pattern: "^[A-Z0-9]{2,6}$"
        name:
          type: string
        slaMinutes:
          type: ["integer", "null"]
          minimum: 1
          description: SLA propre (minutes). `null` → re-hérite du service (D4).
        displayOrder:
          type: integer
          minimum: 0
        isActive:
          type: boolean
        iconKey:
          type: string

    OperationListResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Operation"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

