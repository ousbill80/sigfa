openapi: "3.1.0"
info:
  title: SIGFA Core API
  version: "1.0.0"
  description: |
    Contrat cœur SIGFA : tenants (banks), agences, services, guichets,
    files d'attente et tickets. Servi sous /api/v1.

    **Multi-tenant** : chaque requête est scopée par le JWT (claim `bankId`
    pour les scopes `bank` et `agency`). Toutes les routes documentent leur
    `x-tenant-scope` et `x-required-role`.

    **Mutations critiques** (†) : POST /tickets, POST /tickets/{id}/close,
    POST /tickets/sync nécessitent l'en-tête `X-Idempotency-Key`.

servers:
  - url: /api/v1
    description: SIGFA v1

security:
  - BearerAuth: []

# ─── TAGS ──────────────────────────────────────────────────────────────────────
tags:
  - name: Auth
    description: Authentification JWT (access 15 min · refresh 7 j rotation)
  - name: Banks
    description: Ressources banques (scope platform, SUPER_ADMIN)
  - name: Agencies
    description: Agences d'une banque
  - name: Services
    description: Services proposés par une agence
  - name: Operations
    description: Opérations (actions précises) rattachées à un service — MODEL-CONTRACT-A
  - name: Counters
    description: Guichets et sélection du ticket suivant
  - name: Queues
    description: Files d'attente par agence
  - name: Tickets
    description: Machine à états du ticket (WAITING→CALLED→SERVING→DONE|NO_SHOW|ABANDONED|TRANSFERRED)

# ─── PATHS ─────────────────────────────────────────────────────────────────────
paths:

  # ──────────────────────────────────────────────────────────────────────────────
  # AUTH
  # ──────────────────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Connexion et obtention des tokens JWT
      description: |
        Authentifie un utilisateur et retourne un access token (15 min) et un
        refresh token (7 j, rotation). Limité à **5 tentatives par 15 min** par
        IP (429 `TOO_MANY_REQUESTS`).
      x-tenant-scope: bank
      x-required-role: NONE
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              email: agent@banque-ci.com
              password: "S3cr3t!"
      responses:
        "200":
          description: Tokens JWT retournés
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
              example:
                accessToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyXzEifQ.sig"
                refreshToken: "rt_abc123"
                expiresIn: 900
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          description: Trop de tentatives (5 tentatives / 15 min par IP)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: TOO_MANY_REQUESTS
                  message: "Trop de tentatives de connexion. Réessayez dans 15 minutes."
                  details:
                    retryAfterSeconds: 900
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Renouvellement du token d'accès
      description: |
        Échange un refresh token valide contre un nouveau couple access/refresh
        (rotation : l'ancien refresh token est invalidé).
      x-tenant-scope: bank
      x-required-role: NONE
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: "rt_abc123"
      responses:
        "200":
          description: Nouveaux tokens JWT
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
              example:
                accessToken: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJ1c2VyXzEifQ.sig2"
                refreshToken: "rt_def456"
                expiresIn: 900
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Déconnexion (révocation du refresh token)
      description: Révoque le refresh token actif de l'utilisateur.
      x-tenant-scope: bank
      x-required-role: NONE
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: "rt_abc123"
      responses:
        "200":
          description: Déconnexion réussie
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              example:
                success: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /auth/me:
    get:
      tags: [Auth]
      summary: Profil de l'utilisateur connecté
      description: Retourne le profil et les permissions de l'utilisateur authentifié.
      x-tenant-scope: bank
      x-required-role: AUTHENTICATED
      responses:
        "200":
          description: Profil utilisateur
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
              example:
                id: "55555555-5555-4555-a555-555555555555"
                email: "agent@banque-ci.com"
                role: AGENT
                bankId: "11111111-1111-4111-a111-111111111111"
                agencyId: "33333333-3333-4333-a333-333333333333"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ──────────────────────────────────────────────────────────────────────────────
  # BANKS
  # ──────────────────────────────────────────────────────────────────────────────
  /banks:
    get:
      tags: [Banks]
      summary: Liste toutes les banques (platform)
      description: |
        Retourne la liste paginée de toutes les banques.
        Scope **platform** — accessible uniquement au SUPER_ADMIN.
      x-tenant-scope: platform
      x-required-role: SUPER_ADMIN
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Liste paginée des banques
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankListResponse"
              example:
                data:
                  - id: "11111111-1111-4111-a111-111111111111"
                    name: "Banque Nationale de Côte d'Ivoire"
                    slug: "bnci"
                    active: true
                meta:
                  page: 1
                  limit: 20
                  total: 3
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Banks]
      summary: Créer une banque (platform)
      description: |
        Crée une nouvelle banque. Scope **platform** — SUPER_ADMIN uniquement.
      x-tenant-scope: platform
      x-required-role: SUPER_ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBankRequest"
            example:
              name: "Banque Atlantique CI"
              slug: "baci"
              contactEmail: "admin@baci.ci"
      responses:
        "201":
          description: Banque créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bank"
              example:
                id: "22222222-2222-4222-a222-222222222222"
                name: "Banque Atlantique CI"
                slug: "baci"
                active: true
                createdAt: "2026-01-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /banks/{id}:
    get:
      tags: [Banks]
      summary: Obtenir une banque par son identifiant
      description: Retourne le détail d'une banque. Scope **bank** (BANK_ADMIN) ou **platform** (SUPER_ADMIN).
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Détail de la banque
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bank"
              example:
                id: "11111111-1111-4111-a111-111111111111"
                name: "Banque Nationale de Côte d'Ivoire"
                slug: "bnci"
                active: true
                createdAt: "2025-01-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags: [Banks]
      summary: Mettre à jour une banque
      description: Mise à jour partielle d'une banque (nom, statut, etc.).
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankRequest"
            example:
              name: "BNCI (renommée)"
              active: false
      responses:
        "200":
          description: Banque mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bank"
              example:
                id: "11111111-1111-4111-a111-111111111111"
                name: "BNCI (renommée)"
                slug: "bnci"
                active: false
                createdAt: "2025-01-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ──────────────────────────────────────────────────────────────────────────────
  # AGENCIES
  # ──────────────────────────────────────────────────────────────────────────────
  /agencies:
    get:
      tags: [Agencies]
      summary: Lister les agences de la banque
      description: |
        Retourne la liste paginée des agences de la banque authentifiée (claim `bankId`).
        Scope **bank**.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Liste paginée des agences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyListResponse"
              example:
                data:
                  - id: "33333333-3333-4333-a333-333333333333"
                    name: "Agence Plateau"
                    bankId: "11111111-1111-4111-a111-111111111111"
                    active: true
                meta:
                  page: 1
                  limit: 20
                  total: 5
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Agencies]
      summary: Créer une agence
      description: Crée une nouvelle agence rattachée à la banque authentifiée.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgencyRequest"
            example:
              name: "Agence Cocody"
              address: "Cocody, Abidjan, CI"
              phone: "+2250700000001"
              timezone: "Africa/Abidjan"
      responses:
        "201":
          description: Agence créée
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
              example:
                id: "44444444-4444-4444-a444-444444444444"
                name: "Agence Cocody"
                bankId: "11111111-1111-4111-a111-111111111111"
                active: true
                createdAt: "2026-01-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /agencies/{id}:
    get:
      tags: [Agencies]
      summary: Obtenir une agence
      description: Retourne le détail d'une agence. Scope **agency** — AGENCY_DIRECTOR minimum.
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Détail de l'agence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
              example:
                id: "33333333-3333-4333-a333-333333333333"
                name: "Agence Plateau"
                bankId: "11111111-1111-4111-a111-111111111111"
                active: true
                createdAt: "2025-06-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    patch:
      tags: [Agencies]
      summary: Mettre à jour une agence
      description: Mise à jour partielle d'une agence.
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencyRequest"
            example:
              name: "Agence Plateau (renommée)"
              active: false
      responses:
        "200":
          description: Agence mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agency"
              example:
                id: "33333333-3333-4333-a333-333333333333"
                name: "Agence Plateau (renommée)"
                bankId: "11111111-1111-4111-a111-111111111111"
                active: false
                createdAt: "2025-06-01T00:00:00Z"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    delete:
      tags: [Agencies]
      summary: Supprimer une agence
      description: |
        Supprime logiquement une agence (soft delete / désactivation). Une agence avec des
        tickets ouverts ne peut pas être supprimée (409 `AGENCY_HAS_OPEN_TICKETS`).
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Agence supprimée
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              example:
                success: true
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflit — agence avec tickets ouverts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error:
                  code: AGENCY_HAS_OPEN_TICKETS
                  message: "Impossible de supprimer une agence avec des tickets ouverts."
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  # ──────────────────────────────────────────────────────────────────────────────
  # SERVICES
  # ──────────────────────────────────────────────────────────────────────────────
  /services:
    get:
      tags: [Services]
      summary: Lister les services d'une agence
      description: Retourne la liste paginée des services proposés par l'agence authentifiée.
      x-tenant-scope: agency
      x-required-role: MANAGER
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Liste paginée des services
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceListResponse"
              example:
                data:
                  - id: "77777777-7777-4777-a777-777777777777"
                    name: "Virements"
                    code: "OC"
                    agencyId: "33333333-3333-4333-a333-333333333333"
                    slaMinutes: 10
                    active: true
                    order: 1
                meta:
                  page: 1
                  limit: 20
                  total: 4
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

    post:
      tags: [Services]
      summary: Créer un service
      description: Crée un nouveau service dans l'agence authentifiée.
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateServiceRequest"
            example:
              name: "Crédits immobiliers"
              code: "CR"
              slaMinutes: 20
              order: 5
      responses:
        "201":
          description: Service créé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
              example:
                id: "bbbbbbbb-bbbb-4bbb-abbb-bbbbbbbbbbbb"
                name: "Crédits immobiliers"
                code: "CR"
                agencyId: "33333333-3333-4333-a333-333333333333"
                slaMinutes: 20
                active: true
                order: 5
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /services/{id}:
    patch:
      tags: [Services]
      summary: Mettre à jour un service (SLA, ordre, statut)
      description: Mise à jour partielle d'un service (SLA, ordre d'affichage, actif/inactif).
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateServiceRequest"
            example:
              slaMinutes: 15
              active: false
              order: 2
      responses:
        "200":
          description: Service mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
              example:
                id: "77777777-7777-4777-a777-777777777777"
                name: "Virements"
                code: "OC"
                agencyId: "33333333-3333-4333-a333-333333333333"
                slaMinutes: 15
                active: false
                order: 2
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
