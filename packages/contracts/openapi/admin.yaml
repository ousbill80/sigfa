        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # CLONE / PROVISION / ONBOARDING (CONTRACT-013 / ADM-002)
  # ─────────────────────────────────────────────────────────────────────────────

  /banks/{id}/agencies:clone:
    post:
      tags: [Onboarding]
      summary: Cloner une agence (template ou agence source) et démarrer l'onboarding
      description: |
        Crée une nouvelle agence à partir d'un template OU d'une agence source, et démarre
        un parcours d'onboarding. Exactement une source requise (`templateId` XOR `sourceAgencyId`)
        sinon 422 `CLONE_SOURCE_REQUIRED`. Additif CONTRACT-013 (ADM-002).
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CloneAgencyRequest"
            example:
              name: "Agence Marcory"
              templateId: "33333333-3333-4333-a333-333333333333"
      responses:
        "201":
          description: Agence clonée + onboarding démarré
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CloneAgencyProvisionResponse"
              example:
                agencyId: "66666666-6666-4666-a666-666666666666"
                onboardingId: "77777777-7777-4777-a777-777777777777"
                createdAt: "2026-07-12T10:00:00Z"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: Source de clonage manquante ou ambiguë
          content:
            application/json:
              schema:
                $ref: "./core.yaml#/components/schemas/ErrorResponse"
