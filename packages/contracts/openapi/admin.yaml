openapi: "3.1.0"
info:
  title: SIGFA Admin API
  version: "1.0.0"
  description: |
    Contrat admin SIGFA : RBAC, configuration banque/agence, theming, templates SMS,
    audit trail (immuable) et droit à l'oubli UEMOA. Servi sous /api/v1.

    **Hiérarchie RBAC** (du plus large au plus restreint) :
    - `SUPER_ADMIN` : accès platform complet (toutes les banques)
    - `BANK_ADMIN` : admin de la banque (toutes les agences)
    - `AGENCY_DIRECTOR` : directeur d'agence (une agence)
    - `MANAGER` : manager d'agence
    - `AGENT` : agent de guichet
    - `AUDITOR` : lecture seule, audit trail
    - `NONE` : routes publiques (sans auth)

    **Rôles requis** : définis par `x-required-role` sur chaque opération.
    La hiérarchie est cumulative : un SUPER_ADMIN peut effectuer toutes les
    opérations d'un BANK_ADMIN ou AUDITOR.

    **Mutations critiques** (†) : `POST /data/purge-phone` nécessite
    l'en-tête `X-Idempotency-Key`.

servers:
  - url: /api/v1
    description: SIGFA v1

security:
  - BearerAuth: []

tags:
  - name: Theme
    description: Theming banque — logo R2 (2 étapes), couleurs (appliedColors/requestedColors), messages de bienvenue
  - name: AgencyConfig
    description: Configuration agences — horaires, fériés, fermetures exceptionnelles
  - name: SmsTemplates
    description: Templates SMS par type de notification (NotificationType)
  - name: Thresholds
    description: Seuils d'alerte et délais configurables de la file d'attente
  - name: AuditLogs
    description: Journal d'audit — lecture seule, AUDITOR et SUPER_ADMIN uniquement
  - name: DataPrivacy
    description: Droit à l'oubli UEMOA — purge téléphonique et politique de rétention
  - name: Onboarding
    description: Onboarding agences — clonage de config et accès borne (kiosk)
  - name: Agencies
    description: Gestion des agences (admin) — suppression soft avec vérification tickets ouverts

paths:

  # ─────────────────────────────────────────────────────────────────────────────
  # THEME
  # ─────────────────────────────────────────────────────────────────────────────

  /banks/{id}/theme:
    get:
      tags: [Theme]
      summary: Obtenir le thème de la banque
      description: |
        Retourne la configuration de theming de la banque : logo (URL signée R2),
        couleurs (`requestedColors` soumises et `appliedColors` après correction
        automatique du contraste ≥4.5:1), et messages de bienvenue en 4 langues.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: Thème de la banque
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTheme"
              example:
                logoUrl: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
                requestedColors:
                  primary: "#003f7f"
                  secondary: "#e8a000"
                  background: "#ffffff"
                appliedColors:
                  primary: "#003f7f"
                  secondary: "#c07800"
                  background: "#ffffff"
                welcomeMessages:
                  fr: "Bienvenue à la Banque Nationale de Côte d'Ivoire"
                  dioula: "Bienvenida BNCI"
                  baoule: "Akwaba BNCI"
                  en: "Welcome to BNCI"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

    patch:
      tags: [Theme]
      summary: Mettre à jour le thème de la banque
      description: |
        Met à jour la configuration de theming. Les couleurs soumises
        (`requestedColors`) sont stockées telles quelles ; les couleurs
        appliquées (`appliedColors`) sont calculées automatiquement avec
        correction de contraste ≥4.5:1 (WCAG AA).

        **additionalProperties: false** : tout champ hors schéma → 422.

        Messages de bienvenue (`welcomeMessages`) :
        - `fr` : requis, texte brut, max 200 caractères
        - `dioula`, `baoule`, `en` : optionnels, texte brut, max 200 caractères
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBankThemeRequest"
            example:
              requestedColors:
                primary: "#003f7f"
                secondary: "#e8a000"
                background: "#ffffff"
              welcomeMessages:
                fr: "Bienvenue à la BNCI"
                en: "Welcome to BNCI"
      responses:
        "200":
          description: Thème mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankTheme"
              example:
                logoUrl: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
                requestedColors:
                  primary: "#003f7f"
                  secondary: "#e8a000"
                  background: "#ffffff"
                appliedColors:
                  primary: "#003f7f"
                  secondary: "#c07800"
                  background: "#ffffff"
                welcomeMessages:
                  fr: "Bienvenue à la BNCI"
                  en: "Welcome to BNCI"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: |
            Champ hors schéma ou données sémantiquement invalides. Codes (additif CONTRACT-013) :
            `INVALID_BRAND` (couleur `--brand` invalide), `UNKNOWN_FIELD` (token de structure interdit).
          content:
            application/json:
              schema:
                $ref: "./core.yaml#/components/schemas/ErrorResponse"
              examples:
                unknown_field:
                  summary: Champ de structure interdit (theming = habillage, jamais structure)
                  value:
                    error:
                      code: UNKNOWN_FIELD
                      message: "Champ inconnu : 'fontFamily'. Le theming n'autorise aucun token de structure."
                invalid_brand:
                  summary: Couleur de marque invalide
                  value:
                    error:
                      code: INVALID_BRAND
                      message: "Couleur --brand invalide : format hexadécimal #RRGGBB attendu."
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /banks/{id}/theme/logo-upload-url:
    get:
      tags: [Theme]
      summary: Obtenir une URL présignée R2 pour l'upload du logo (étape 1/2)
      description: |
        Première étape de l'upload du logo en 2 temps (R2 signé) :
        1. `GET /banks/{id}/theme/logo-upload-url` → `{ presignedUrl, expiresIn: 300 }`
        2. Le client effectue un `PUT` HTTP directement vers `presignedUrl`
           avec le fichier logo (Content-Type approprié).

        **Formats acceptés** : `image/png`, `image/svg+xml`, `image/jpeg`
        **Taille maximale** : 2 Mo (2 000 000 octets)
        **Dimensions minimales** : 200×200 px

        Après le PUT client, aucun appel serveur supplémentaire n'est requis ;
        le logo est disponible via l'URL publique du CDN.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
        - name: contentType
          in: query
          required: true
          description: |
            Type MIME du fichier logo à uploader.
            Valeurs acceptées : `image/png`, `image/svg+xml`, `image/jpeg`.
          schema:
            type: string
            enum:
              - image/png
              - image/svg+xml
              - image/jpeg
      responses:
        "200":
          description: URL présignée R2 valide 300 secondes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoUploadUrlResponse"
              example:
                presignedUrl: "https://r2.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png?X-Amz-Signature=abc123&X-Amz-Expires=300"
                expiresIn: 300
                maxSizeBytes: 2000000
                minDimensionsPx: 200
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: Type MIME non accepté
          content:
            application/json:
              schema:
                $ref: "./core.yaml#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UNSUPPORTED_MEDIA_TYPE
                  message: "Type MIME non accepté. Formats valides : image/png, image/svg+xml, image/jpeg."
                  details:
                    accepted:
                      - image/png
                      - image/svg+xml
                      - image/jpeg
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /banks/{id}/theme/logo:
    post:
      tags: [Theme]
      summary: Uploader le logo de la banque (multipart, additif CONTRACT-013)
      description: |
        Upload direct du logo (multipart/form-data) — alternative à l'URL présignée.
        Retourne `{ logoUrl }`. Un logo hors format/dimensions → 422 `INVALID_LOGO`.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Fichier logo (image/png, image/svg+xml, image/jpeg ; ≤ 2 Mo ; ≥ 200×200 px)
      responses:
        "200":
          description: Logo uploadé
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ThemeLogoUploadResponse"
              example:
                logoUrl: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: Logo invalide (format, taille ou dimensions non conformes)
          content:
            application/json:
              schema:
                $ref: "./core.yaml#/components/schemas/ErrorResponse"
              example:
                error:
                  code: INVALID_LOGO
                  message: "Logo invalide : format non supporté ou dimensions < 200×200 px."
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /public/banks/{id}/theme:
    get:
      tags: [Theme]
      summary: Projection publique du thème d'une banque (additif CONTRACT-013)
      description: |
        Retourne l'habillage public effectif d'une banque (couleurs appliquées, logo,
        messages de bienvenue). **Route publique** (aucune authentification), **zéro PII**.
      x-tenant-scope: bank
      x-required-role: NONE
      security: []
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: Projection publique du thème
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicBankTheme"
              example:
                logoUrl: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
                appliedColors:
                  primary: "#003f7f"
                  secondary: "#c07800"
                  background: "#ffffff"
                welcomeMessages:
                  fr: "Bienvenue à la BNCI"
                  en: "Welcome to BNCI"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # WHATSAPP BUSINESS CONFIG (CONTRACT-013 / NOTIF-003)
  # ─────────────────────────────────────────────────────────────────────────────

  /banks/{id}/whatsapp-config:
    get:
      tags: [Theme]
      summary: Obtenir la configuration WhatsApp Business de la banque (additif CONTRACT-013)
      description: |
        Retourne la config WhatsApp Business (numéro, mapping menu→service).
        Le `webhookSecret` est masqué en lecture (jamais re-exposé en clair).
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: Configuration WhatsApp Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppConfig"
              example:
                businessNumber: "+2252700000001"
                webhookSecret: null
                menuMapping:
                  - keyword: "1"
                    serviceId: "88888888-8888-4888-a888-888888888888"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"
    patch:
      tags: [Theme]
      summary: Mettre à jour la configuration WhatsApp Business (additif CONTRACT-013)
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWhatsAppConfigRequest"
            example:
              businessNumber: "+2252700000001"
              menuMapping:
                - keyword: "1"
                  serviceId: "88888888-8888-4888-a888-888888888888"
      responses:
        "200":
          description: Configuration mise à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WhatsAppConfig"
              example:
                businessNumber: "+2252700000001"
                webhookSecret: null
                menuMapping:
                  - keyword: "1"
                    serviceId: "88888888-8888-4888-a888-888888888888"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # AGENCY HOURS
  # ─────────────────────────────────────────────────────────────────────────────

  /agencies/{id}/hours:
    get:
      tags: [AgencyConfig]
      summary: Obtenir les horaires d'une agence
      description: |
        Retourne la configuration des horaires de l'agence : heures par jour de la
        semaine, jours fériés nationaux CI (pré-chargés) et fermetures exceptionnelles.
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: Horaires de l'agence
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyHours"
              example:
                weeklySchedule:
                  monday:
                    open: "08:00"
                    close: "17:00"
                    closed: false
                  tuesday:
                    open: "08:00"
                    close: "17:00"
                    closed: false
                  wednesday:
                    open: "08:00"
                    close: "17:00"
                    closed: false
                  thursday:
                    open: "08:00"
                    close: "17:00"
                    closed: false
                  friday:
                    open: "08:00"
                    close: "16:00"
                    closed: false
                  saturday:
                    open: "09:00"
                    close: "13:00"
                    closed: false
                  sunday:
                    open: "00:00"
                    close: "00:00"
                    closed: true
                publicHolidaysCI:
                  - date: "2026-01-01"
                    label: "Jour de l'An"
                  - date: "2026-08-07"
                    label: "Fête Nationale de Côte d'Ivoire"
                exceptionalClosures:
                  - date: "2026-03-15"
                    reason: "Formation du personnel"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

    patch:
      tags: [AgencyConfig]
      summary: Mettre à jour les horaires d'une agence
      description: |
        Met à jour les horaires hebdomadaires et/ou les fermetures exceptionnelles.
        Les fériés CI sont gérés en lecture seule (pré-chargés par le système).

        **additionalProperties: false** : tout champ hors schéma → 422.
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgencyHoursRequest"
            example:
              weeklySchedule:
                saturday:
                  open: "09:00"
                  close: "12:00"
                  closed: false
              exceptionalClosures:
                - date: "2026-03-15"
                  reason: "Formation du personnel"
      responses:
        "200":
          description: Horaires mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgencyHours"
              example:
                weeklySchedule:
                  monday:
                    open: "08:00"
                    close: "17:00"
                    closed: false
                  saturday:
                    open: "09:00"
                    close: "12:00"
                    closed: false
                  sunday:
                    open: "00:00"
                    close: "00:00"
                    closed: true
                publicHolidaysCI:
                  - date: "2026-08-07"
                    label: "Fête Nationale de Côte d'Ivoire"
                exceptionalClosures:
                  - date: "2026-03-15"
                    reason: "Formation du personnel"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: Champ hors schéma ou données invalides
          content:
            application/json:
              schema:
                $ref: "./core.yaml#/components/schemas/ErrorResponse"
              example:
                error:
                  code: UNPROCESSABLE_ENTITY
                  message: "Champ inconnu dans la requête. additionalProperties est false."
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # SMS TEMPLATES
  # ─────────────────────────────────────────────────────────────────────────────

  /banks/{id}/sms-templates:
    get:
      tags: [SmsTemplates]
      summary: Obtenir les templates SMS de la banque
      description: |
        Retourne les templates SMS configurés par type de notification
        (`NotificationType` référencé depuis core.yaml).

        Variables autorisées dans les templates : `{{number}}`, `{{position}}`,
        `{{estimate}}`.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: Templates SMS de la banque
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsTemplateList"
              example:
                templates:
                  - type: TICKET_CONFIRMATION
                    content: "Votre ticket {{number}} est enregistré. Position : {{position}}. Attente estimée : {{estimate}} min."
                  - type: YOUR_TURN
                    content: "C'est votre tour ! Ticket {{number}}, présentez-vous au guichet."
                  - type: POSITION_UPDATE
                    content: "Mise à jour : vous êtes maintenant {{position}}e dans la file (ticket {{number}})."
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

    patch:
      tags: [SmsTemplates]
      summary: Mettre à jour les templates SMS de la banque
      description: |
        Met à jour un ou plusieurs templates SMS. Chaque template est identifié
        par son `type` (enum `NotificationType` de core.yaml).

        **Variables autorisées** : `{{number}}`, `{{position}}`, `{{estimate}}`.
        Toute autre variable → **422 `UNKNOWN_TEMPLATE_VARIABLE`**.

        **additionalProperties: false** : tout champ hors schéma → 422.
      x-tenant-scope: bank
      x-required-role: BANK_ADMIN
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSmsTemplatesRequest"
            example:
              templates:
                - type: TICKET_CONFIRMATION
                  content: "Votre ticket {{number}} est créé. Vous êtes {{position}}e, attente : {{estimate}} min."
      responses:
        "200":
          description: Templates SMS mis à jour
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SmsTemplateList"
              example:
                templates:
                  - type: TICKET_CONFIRMATION
                    content: "Votre ticket {{number}} est créé. Vous êtes {{position}}e, attente : {{estimate}} min."
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          description: Variable de template inconnue ou champ hors schéma
          content:
