              example:
                error:
                  code: KIOSK_ENROLLMENT_INVALID
                  message: "Enrôlement invalide."
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /agencies/{id}/onboarding/{onboardingId}:
    get:
      tags: [Onboarding]
      summary: Suivre l'état d'un parcours d'onboarding (étapes + horodatages)
      description: |
        Retourne les étapes de l'onboarding d'une agence avec leurs statuts et horodatages.
        Additif CONTRACT-013 (ADM-002).
