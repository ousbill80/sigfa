        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # SUPERVISION BORNES (CONTRACT-013 / ADM-003)
  # ─────────────────────────────────────────────────────────────────────────────

  /kiosks/{id}/heartbeat:
    post:
      tags: [Onboarding]
      summary: Battement de cœur d'une borne (heartbeat)
      description: |
        Reçoit le heartbeat d'une borne (tolérance de skew ±5 min). Alimente le calcul
        de statut de supervision (ONLINE/DEGRADED/SILENT/NEVER_SEEN). Additif CONTRACT-013 (ADM-003).
      x-tenant-scope: agency
      x-required-role: AGENT
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KioskHeartbeatRequest"
            example:
              ts: "2026-07-12T10:00:00Z"
              fw: "1.4.2"
              printerOk: true
              queueDepth: 7
      responses:
        "204":
          description: Heartbeat enregistré (pas de contenu)
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /agencies/{id}/kiosks/status:
    get:
      tags: [Onboarding]
      summary: État de supervision des bornes d'une agence
      description: |
        Statut calculé à la lecture de chaque borne de l'agence (ONLINE/DEGRADED/SILENT/NEVER_SEEN).
        Additif CONTRACT-013 (ADM-003).
      x-tenant-scope: agency
      x-required-role: MANAGER
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
      responses:
        "200":
          description: États de supervision des bornes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KioskSupervisionStatusResponse"
              example:
                kiosks:
                  - kioskId: "14141414-1414-4141-a141-141414141414"
                    agencyId: "33333333-3333-4333-a333-333333333333"
                    status: "ONLINE"
                    lastSeen: "2026-07-12T09:59:30Z"
                  - kioskId: "15151515-1515-4151-a151-151515151515"
                    agencyId: "33333333-3333-4333-a333-333333333333"
                    status: "SILENT"
                    lastSeen: "2026-07-12T09:40:00Z"
        "400":
          $ref: "./core.yaml#/components/responses/BadRequest"
        "401":
          $ref: "./core.yaml#/components/responses/Unauthorized"
        "403":
          $ref: "./core.yaml#/components/responses/Forbidden"
        "404":
          $ref: "./core.yaml#/components/responses/NotFound"
        "409":
          $ref: "./core.yaml#/components/responses/Conflict"
        "422":
          $ref: "./core.yaml#/components/responses/UnprocessableEntity"
        "429":
          $ref: "./core.yaml#/components/responses/TooManyRequests"
        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  # ─────────────────────────────────────────────────────────────────────────────
  # AGENCIES (admin — DELETE avec soft delete + 409 AGENCY_HAS_OPEN_TICKETS)
  # ─────────────────────────────────────────────────────────────────────────────

# ─── COMPONENTS ──────────────────────────────────────────────────────────────
components:

  # ── Security Schemes (reprise de core pour la cohérence documentaire) ──────
  securitySchemes:
    BearerAuth:
      $ref: "./core.yaml#/components/securitySchemes/BearerAuth"

  # ── Schemas ──────────────────────────────────────────────────────────────────
  schemas:

    # ── Theme ─────────────────────────────────────────────────────────────────

    ColorSet:
      type: object
      description: |
        Ensemble de couleurs de theming (format hexadécimal #RRGGBB).
        `requestedColors` : couleurs soumises par le BANK_ADMIN.
        `appliedColors` : couleurs effectives après correction de contraste ≥4.5:1 (WCAG AA).
      additionalProperties: false
      required:
        - primary
        - secondary
        - background
      properties:
        primary:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Couleur primaire (hexadécimal)
          example: "#003f7f"
        secondary:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Couleur secondaire (hexadécimal)
          example: "#e8a000"
        background:
          type: string
          pattern: "^#[0-9A-Fa-f]{6}$"
          description: Couleur de fond (hexadécimal)
          example: "#ffffff"

    WelcomeMessages:
      type: object
      description: |
        Messages de bienvenue en 4 langues (texte brut, max 200 caractères).
        `fr` est requis. `dioula`, `baoule` et `en` sont optionnels.
      additionalProperties: false
      required:
        - fr
      properties:
        fr:
          type: string
          maxLength: 200
          description: Message en français (requis)
          example: "Bienvenue à la Banque Nationale de Côte d'Ivoire"
        dioula:
          type: string
          maxLength: 200
          description: Message en dioula (optionnel)
          example: "Bienvenida BNCI"
        baoule:
          type: string
          maxLength: 200
          description: Message en baoulé (optionnel)
          example: "Akwaba BNCI"
        en:
          type: string
          maxLength: 200
          description: Message en anglais (optionnel)
          example: "Welcome to BNCI"

    BankTheme:
      type: object
      description: Thème complet de la banque
      additionalProperties: false
      required:
        - requestedColors
        - appliedColors
        - welcomeMessages
      properties:
        logoUrl:
          type: ["string", "null"]
          format: uri
          description: URL publique du logo CDN (null si aucun logo uploadé)
          example: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
        requestedColors:
          $ref: "#/components/schemas/ColorSet"
        appliedColors:
          $ref: "#/components/schemas/ColorSet"
        welcomeMessages:
          $ref: "#/components/schemas/WelcomeMessages"

    UpdateBankThemeRequest:
      type: object
      description: Requête de mise à jour du thème (champs partiels acceptés)
      additionalProperties: false
      properties:
        requestedColors:
          $ref: "#/components/schemas/ColorSet"
        welcomeMessages:
          $ref: "#/components/schemas/WelcomeMessages"

    LogoUploadUrlResponse:
      type: object
      description: URL présignée R2 pour l'upload du logo (étape 1/2)
      additionalProperties: false
      required:
        - presignedUrl
        - expiresIn
        - maxSizeBytes
        - minDimensionsPx
      properties:
        presignedUrl:
          type: string
          format: uri
          description: URL présignée R2 pour le PUT HTTP du logo
          example: "https://r2.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png?X-Amz-Signature=abc123&X-Amz-Expires=300"
        expiresIn:
          type: integer
          description: Durée de validité de l'URL en secondes
          enum: [300]
          example: 300
        maxSizeBytes:
          type: integer
          description: Taille maximale autorisée en octets (2 Mo = 2 000 000 octets)
          enum: [2000000]
          example: 2000000
        minDimensionsPx:
          type: integer
          description: Dimension minimale en pixels (largeur ET hauteur ≥ 200 px)
          enum: [200]
          example: 200

    # ── Agency Hours ──────────────────────────────────────────────────────────

    DaySchedule:
      type: object
      description: Horaires d'ouverture pour un jour de la semaine
      additionalProperties: false
      required:
        - open
        - close
        - closed
      properties:
        open:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
          description: Heure d'ouverture (HH:MM)
          example: "08:00"
        close:
          type: string
          pattern: "^[0-2][0-9]:[0-5][0-9]$"
          description: Heure de fermeture (HH:MM)
          example: "17:00"
        closed:
          type: boolean
          description: true si l'agence est fermée ce jour

    WeeklySchedule:
      type: object
      description: Planning hebdomadaire de l'agence
      additionalProperties: false
      properties:
        monday:
          $ref: "#/components/schemas/DaySchedule"
        tuesday:
          $ref: "#/components/schemas/DaySchedule"
        wednesday:
          $ref: "#/components/schemas/DaySchedule"
        thursday:
          $ref: "#/components/schemas/DaySchedule"
        friday:
          $ref: "#/components/schemas/DaySchedule"
        saturday:
          $ref: "#/components/schemas/DaySchedule"
        sunday:
          $ref: "#/components/schemas/DaySchedule"

    PublicHoliday:
      type: object
      description: Jour férié national CI (pré-chargé par le système)
      additionalProperties: false
      required:
        - date
        - label
      properties:
        date:
          type: string
          format: date
          description: Date du jour férié (YYYY-MM-DD)
          example: "2026-08-07"
        label:
          type: string
          description: Libellé du jour férié
          example: "Fête Nationale de Côte d'Ivoire"

    ExceptionalClosure:
      type: object
      description: Fermeture exceptionnelle définie par l'agence
      additionalProperties: false
      required:
        - date
        - reason
      properties:
        date:
          type: string
          format: date
          description: Date de la fermeture exceptionnelle (YYYY-MM-DD)
          example: "2026-03-15"
        reason:
          type: string
          maxLength: 200
          description: Motif de la fermeture
          example: "Formation du personnel"

    AgencyHours:
      type: object
      description: Configuration des horaires d'une agence
      additionalProperties: false
      required:
        - weeklySchedule
      properties:
        weeklySchedule:
          $ref: "#/components/schemas/WeeklySchedule"
        publicHolidaysCI:
          type: array
          description: Jours fériés nationaux CI (lecture seule, pré-chargés)
          items:
            $ref: "#/components/schemas/PublicHoliday"
        exceptionalClosures:
          type: array
          description: Fermetures exceptionnelles définies par l'agence
          items:
            $ref: "#/components/schemas/ExceptionalClosure"

    UpdateAgencyHoursRequest:
      type: object
      description: Mise à jour partielle des horaires d'une agence
      additionalProperties: false
      properties:
        weeklySchedule:
          $ref: "#/components/schemas/WeeklySchedule"
        exceptionalClosures:
          type: array
          description: Fermetures exceptionnelles (remplace la liste existante)
          items:
            $ref: "#/components/schemas/ExceptionalClosure"

    # ── SMS Templates ─────────────────────────────────────────────────────────

    SmsTemplate:
      type: object
      description: |
        Template SMS pour un type de notification.
        Le type est l'enum `NotificationType` de core.yaml.
        Variables autorisées : `{{number}}`, `{{position}}`, `{{estimate}}`.
      additionalProperties: false
      required:
        - type
        - content
      properties:
        type:
          $ref: "./core.yaml#/components/schemas/NotificationType"
        content:
          type: string
          minLength: 1
          maxLength: 160
          description: |
            Contenu du template SMS.
            Variables autorisées : `{{number}}`, `{{position}}`, `{{estimate}}`.
            Toute autre variable → 422 `UNKNOWN_TEMPLATE_VARIABLE`.
          example: "Votre ticket {{number}} est enregistré. Position : {{position}}. Attente : {{estimate}} min."

    SmsTemplateList:
      type: object
      description: Liste des templates SMS de la banque
      additionalProperties: false
      required:
        - templates
      properties:
        templates:
          type: array
          items:
            $ref: "#/components/schemas/SmsTemplate"

    UpdateSmsTemplatesRequest:
      type: object
      description: Mise à jour des templates SMS (liste complète ou partielle)
      additionalProperties: false
      required:
        - templates
      properties:
        templates:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SmsTemplate"

    # ── Thresholds ────────────────────────────────────────────────────────────

    BankThresholds:
      type: object
      description: |
        Seuils d'alerte et délais configurables de la file d'attente.
        - `queueCriticalThreshold` : seuil d'alerte file critique (1–500 tickets)
        - `agentInactivityMinutes` : délai d'inactivité agent avant alerte (1–60 min)
        - `noShowTimeoutMinutes` : délai d'attente avant no-show (1–30 min, défaut 3)
      additionalProperties: false
      required:
        - queueCriticalThreshold
        - agentInactivityMinutes
        - noShowTimeoutMinutes
      properties:
        queueCriticalThreshold:
          type: integer
          minimum: 1
          maximum: 500
          description: Nombre de tickets dans la file déclenchant une alerte critique
          example: 50
        agentInactivityMinutes:
          type: integer
          minimum: 1
          maximum: 60
          description: Minutes d'inactivité d'un agent avant alerte manager
          example: 15
        noShowTimeoutMinutes:
          type: integer
          minimum: 1
          maximum: 30
          default: 3
          description: Minutes d'attente après appel avant passage en NO_SHOW (défaut 3)
          example: 3
        smsNearThreshold:
          type: integer
          minimum: 1
          maximum: 50
          default: 3
          description: |
            Seuil de position déclenchant la notification POSITION_NEAR (additif CONTRACT-013 / NOTIF-002).
            Optionnel — défaut 3 (« vous êtes 3e »).
          example: 3

    UpdateBankThresholdsRequest:
      type: object
      description: Mise à jour partielle des seuils (tous champs optionnels)
      additionalProperties: false
      properties:
        queueCriticalThreshold:
          type: integer
          minimum: 1
          maximum: 500
          description: Nouveau seuil d'alerte file critique (1–500)
          example: 100
        agentInactivityMinutes:
          type: integer
          minimum: 1
          maximum: 60
          description: Nouveau délai d'inactivité agent (1–60 min)
          example: 20
        noShowTimeoutMinutes:
          type: integer
          minimum: 1
          maximum: 30
          description: Nouveau délai no-show (1–30 min)
          example: 5
        smsNearThreshold:
          type: integer
          minimum: 1
          maximum: 50
          description: Nouveau seuil POSITION_NEAR (additif CONTRACT-013). Optionnel.
          example: 3

    # ── Audit Logs ────────────────────────────────────────────────────────────

    AuditActor:
      type: object
      description: Acteur de l'entrée d'audit
      additionalProperties: false
      required:
        - id
        - role
      properties:
        id:
          type: string
          format: uuid
          description: Identifiant de l'utilisateur acteur
          example: "55555555-5555-4555-a555-555555555555"
        email:
          type: string
          format: email
          description: Email de l'acteur (si disponible)
          example: "admin@bnci.ci"
        role:
          $ref: "./core.yaml#/components/schemas/Role"

    AuditEntry:
      type: object
      description: |
        Entrée du journal d'audit (immuable).
        Champs : `actor`, `action`, `entityType`, `entityId`, `timestamp`, `ip`, `diff`.
      additionalProperties: false
      required:
        - actor
        - action
        - entityType
        - entityId
        - timestamp
        - ip
      properties:
        actor:
          $ref: "#/components/schemas/AuditActor"
        action:
          type: string
          description: Opération effectuée (ex. "PATCH /banks/11111111-1111-4111-a111-111111111111/theme")
          example: "PATCH /banks/11111111-1111-4111-a111-111111111111/theme"
        entityType:
          type: string
          description: Type de l'entité modifiée (ex. "BankTheme", "Agency")
          example: "BankTheme"
        entityId:
          type: string
          description: Identifiant de l'entité modifiée
          example: "11111111-1111-4111-a111-111111111111"
        timestamp:
          type: string
          format: date-time
          description: Horodatage de l'action (UTC ISO 8601)
          example: "2026-07-11T09:00:00Z"
        ip:
          type: string
          description: Adresse IP de l'acteur au moment de l'action
          example: "41.67.128.1"
        diff:
          type: object
          additionalProperties: true
          description: |
            Différentiel avant/après la modification (optionnel selon l'action).
            Format : `{ before: {...}, after: {...} }`
          example:
            before:
              requestedColors:
                primary: "#003f7f"
            after:
              requestedColors:
                primary: "#004f9f"

    AuditLogListResponse:
      type: object
      description: Réponse paginée du journal d'audit
      additionalProperties: false
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/AuditEntry"
        meta:
          $ref: "./core.yaml#/components/schemas/PaginationMeta"

    # ── Data Privacy ──────────────────────────────────────────────────────────

    PurgePhoneRequest:
      type: object
      description: Requête de purge d'un numéro de téléphone (droit à l'oubli UEMOA)
      additionalProperties: false
      required:
        - phone
      properties:
        phone:
          type: string
          pattern: "^\\+[1-9][0-9]{7,14}$"
          description: Numéro de téléphone au format E.164 (ex. +2250700000001)
          example: "+2250700000001"

    PurgePhoneResponse:
      type: object
      description: |
        Réponse à POST /data/purge-phone.
        - `purged: true` → premier appel, purge effectuée.
        - `purged: false` → appel idempotent (téléphone déjà purgé).
      additionalProperties: false
      required:
        - purged
        - affectedTickets
      properties:
        purged:
          type: boolean
          description: |
            true si la purge a été effectuée lors de cet appel.
            false si le téléphone avait déjà été purgé (idempotence).
          example: true
        affectedTickets:
          type: integer
          minimum: 0
          description: Nombre de tickets dont les données personnelles ont été effacées
          example: 7

    RetentionPolicy:
      type: object
      description: Politique de rétention des données personnelles
      additionalProperties: false
      required:
        - retentionMonths
        - description
        - purgeSchedule
      properties:
        retentionMonths:
          type: integer
          minimum: 1
          maximum: 120
          description: Durée de rétention en mois (défaut 13 mois)
          example: 13
        description:
          type: string
          description: Description de la politique
          example: "Les données personnelles des clients sont conservées 13 mois après la dernière interaction."
        purgeSchedule:
          type: string
          enum:
            - daily
            - weekly
            - monthly
          description: Fréquence du batch de purge automatique
          example: "daily"
        lastPurgeAt:
          type: ["string", "null"]
          format: date-time
          description: Horodatage du dernier batch de purge (null si jamais lancé)
          example: "2026-07-10T02:00:00Z"

    # ── Onboarding ────────────────────────────────────────────────────────────

    CloneAgencyResponse:
      type: object
      description: Résultat du clonage de configuration d'agence
      additionalProperties: false
      required:
        - targetAgencyId
        - templateAgencyId
        - clonedSections
        - clonedAt
      properties:
        targetAgencyId:
          type: string
          format: uuid
          description: Identifiant de l'agence cible (celle qui reçoit la config)
          example: "44444444-4444-4444-a444-444444444444"
        templateAgencyId:
          type: string
          format: uuid
          description: Identifiant de l'agence template (source de la config)
          example: "33333333-3333-4333-a333-333333333333"
        clonedSections:
          type: array
          description: Sections de configuration clonées (jamais les données clients)
          items:
            type: string
            enum:
              - hours
              - smsTemplates
              - thresholds
              - services
          example:
            - hours
            - smsTemplates
            - thresholds
            - services
        clonedAt:
          type: string
          format: date-time
          description: Horodatage du clonage
          example: "2026-07-11T10:00:00Z"

    KioskAccessRequest:
      type: object
      description: Requête de génération de credentials borne
      additionalProperties: false
      properties:
        label:
          type: string
          maxLength: 100
          description: Libellé de la borne (ex. "Borne entrée principale")
          example: "Borne entrée principale"

    KioskAccessResponse:
      type: object
      description: Credentials borne + QR d'installation
      additionalProperties: false
      required:
        - kioskId
        - clientId
        - clientSecret
        - qrCodeDataUrl
        - agencyId
        - createdAt
      properties:
        kioskId:
          type: string
          format: uuid
          description: Identifiant unique de la borne
          example: "14141414-1414-4141-a141-141414141414"
        clientId:
          type: string
          description: Client ID pour l'authentification de la borne
          example: "kiosk_client_7f3a9b"
        clientSecret:
          type: string
          description: Client secret (transmis une seule fois, à stocker côté borne)
          example: "ksk_XzP9mQr2nLsT4vWyBjH6cKdF"
        qrCodeDataUrl:
          type: string
          description: QR code d'installation encodé en Data URL (PNG base64)
          example: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgA..."
        label:
          type: ["string", "null"]
          maxLength: 100
          description: Libellé de la borne
          example: "Borne entrée principale"
        agencyId:
          type: string
          format: uuid
          description: Identifiant de l'agence à laquelle appartient la borne
          example: "33333333-3333-4333-a333-333333333333"
        createdAt:
          type: string
          format: date-time
          description: Horodatage de création des credentials
          example: "2026-07-11T10:05:00Z"

    # ── WhatsApp Business config (CONTRACT-013 / NOTIF-003) ──────────────────────

    WhatsAppMenuMapping:
      type: object
      description: Association d'une entrée de menu / mot-clé entrant à un service.
      additionalProperties: false
      required:
        - keyword
        - serviceId
      properties:
        keyword:
          type: string
          minLength: 1
          maxLength: 40
          description: Entrée de menu numérotée ou mot-clé (ex. "1", "DEPOT")
          example: "1"
        serviceId:
          type: string
          format: uuid
          description: Service SIGFA ciblé par cette entrée
          example: "88888888-8888-4888-a888-888888888888"

    WhatsAppConfig:
      type: object
      description: |
        Configuration WhatsApp Business par banque (additif CONTRACT-013 / NOTIF-003).
        Le `webhookSecret` n'est jamais re-exposé en clair après création (masqué en lecture).
      additionalProperties: false
      required:
        - businessNumber
        - menuMapping
      properties:
        businessNumber:
          type: string
          pattern: "^\\+[1-9]\\d{6,14}$"
          description: Numéro WhatsApp Business vérifié de la banque (E.164)
          example: "+2252700000001"
        webhookSecret:
          type: ["string", "null"]
          description: |
            Secret de vérification de signature du webhook entrant (masqué en lecture,
            fourni en écriture). `null` en lecture si déjà configuré (jamais re-exposé).
          example: "wa_secret_••••"
        menuMapping:
          type: array
          description: Mapping menu/mot-clé entrant → service SIGFA (parcours « prendre un ticket »)
          items:
            $ref: "#/components/schemas/WhatsAppMenuMapping"

    UpdateWhatsAppConfigRequest:
      type: object
      description: Mise à jour partielle de la configuration WhatsApp Business.
      additionalProperties: false
      properties:
        businessNumber:
          type: string
          pattern: "^\\+[1-9]\\d{6,14}$"
          example: "+2252700000001"
        webhookSecret:
          type: string
          description: Nouveau secret de signature du webhook (écriture seule)
          example: "wa_secret_new_value"
        menuMapping:
          type: array
          items:
            $ref: "#/components/schemas/WhatsAppMenuMapping"

    # ── Projection publique du thème (CONTRACT-013 / ADM-001) ────────────────────

    PublicBankTheme:
      type: object
      description: |
        Projection publique du thème d'une banque (additif CONTRACT-013 / ADM-001).
        **Zéro PII** : uniquement l'habillage effectif (couleurs corrigées, logo, messages).
      additionalProperties: false
      required:
        - appliedColors
        - welcomeMessages
      properties:
        logoUrl:
          type: ["string", "null"]
          format: uri
          description: URL publique du logo (null si aucun logo)
          example: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"
        appliedColors:
          $ref: "#/components/schemas/ColorSet"
        welcomeMessages:
          $ref: "#/components/schemas/WelcomeMessages"

    ThemeLogoUploadResponse:
      type: object
      description: Résultat de l'upload direct du logo (additif CONTRACT-013 / ADM-001).
      additionalProperties: false
      required:
        - logoUrl
      properties:
        logoUrl:
          type: string
          format: uri
          description: URL publique du logo uploadé
          example: "https://cdn.sigfa.ci/logos/11111111-1111-4111-a111-111111111111/logo.png"

    # ── Clone / Provision / Onboarding (CONTRACT-013 / ADM-002) ──────────────────

    CloneAgencyRequest:
      type: object
      description: |
        Requête de clonage d'agence (additif CONTRACT-013 / ADM-002).
        Exactement une source doit être fournie : `templateId` OU `sourceAgencyId`
        (sinon 422 `CLONE_SOURCE_REQUIRED`).
      additionalProperties: false
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          description: Nom de la nouvelle agence
          example: "Agence Marcory"
        templateId:
          type: string
          format: uuid
          description: Identifiant d'un template d'agence source (mutuellement exclusif avec sourceAgencyId)
          example: "33333333-3333-4333-a333-333333333333"
        sourceAgencyId:
          type: string
          format: uuid
          description: Identifiant d'une agence existante à cloner (mutuellement exclusif avec templateId)
          example: "44444444-4444-4444-a444-444444444444"

    CloneAgencyProvisionResponse:
      type: object
      description: Résultat du clonage + démarrage de l'onboarding (additif CONTRACT-013 / ADM-002).
      additionalProperties: false
      required:
        - agencyId
        - onboardingId
        - createdAt
      properties:
        agencyId:
          type: string
          format: uuid
          description: Identifiant de l'agence créée
          example: "66666666-6666-4666-a666-666666666666"
        onboardingId:
          type: string
          format: uuid
          description: Identifiant du parcours d'onboarding démarré
          example: "77777777-7777-4777-a777-777777777777"
        createdAt:
          type: string
          format: date-time
          example: "2026-07-12T10:00:00Z"

    ProvisionKioskResponse:
      type: object
      description: |
        Enrôlement d'une borne (additif CONTRACT-013 / ADM-002).
        Le `enrollmentToken` est à usage unique, à TTL court, opaque et jamais loggé.
      additionalProperties: false
      required:
        - kioskId
        - enrollmentToken
        - enrollmentQrUrl
        - expiresAt
      properties:
        kioskId:
          type: string
          format: uuid
          description: Identifiant de la borne provisionnée
          example: "14141414-1414-4141-a141-141414141414"
        enrollmentToken:
          type: string
          description: Jeton d'enrôlement opaque à usage unique (échangé contre les credentials borne)
          example: "enr_9fA2kQ7bZ1..."
        enrollmentQrUrl:
          type: string
          format: uri
          description: URL d'enrôlement (encodée dans le QR d'installation — jamais le token en clair)
          example: "https://app.sigfa.ci/enroll/14141414-1414-4141-a141-141414141414"
        expiresAt:
          type: string
          format: date-time
          description: Expiration du jeton d'enrôlement (TTL court)
          example: "2026-07-12T10:30:00Z"

    OnboardingStepStatus:
      type: string
      description: Statut d'une étape d'onboarding.
      enum:
        - PENDING
        - IN_PROGRESS
        - DONE
        - SKIPPED

    OnboardingStep:
      type: object
      description: Étape d'un parcours d'onboarding avec ses horodatages.
      additionalProperties: false
      required:
        - key
        - status
      properties:
        key:
          type: string
          description: Clé de l'étape (ex. "clone", "kiosk-provision", "hours", "theme")
          example: "kiosk-provision"
        status:
          $ref: "#/components/schemas/OnboardingStepStatus"
        completedAt:
          type: ["string", "null"]
          format: date-time
          description: Horodatage de complétion (null si non terminée)
          example: "2026-07-12T10:12:00Z"

    OnboardingStatusResponse:
      type: object
      description: État d'un parcours d'onboarding d'agence (additif CONTRACT-013 / ADM-002).
      additionalProperties: false
      required:
        - onboardingId
        - agencyId
        - steps
        - startedAt
      properties:
        onboardingId:
          type: string
          format: uuid
          example: "77777777-7777-4777-a777-777777777777"
        agencyId:
          type: string
          format: uuid
          example: "66666666-6666-4666-a666-666666666666"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/OnboardingStep"
        startedAt:
          type: string
          format: date-time
          example: "2026-07-12T10:00:00Z"
        completedAt:
          type: ["string", "null"]
          format: date-time
          description: Horodatage de fin de l'onboarding (null si en cours)
          example: null

    # ── Supervision bornes (CONTRACT-013 / ADM-003) ──────────────────────────────

    KioskStatus:
      type: string
      description: |
        Statut de supervision d'une borne (additif CONTRACT-013 / ADM-003).
        - ONLINE : heartbeat récent, borne opérationnelle
        - DEGRADED : heartbeat récent mais anomalie signalée (ex. imprimante)
        - SILENT : aucun heartbeat depuis `silentThresholdSec` (borne muette)
        - NEVER_SEEN : borne provisionnée n'ayant jamais émis de heartbeat
      enum:
        - ONLINE
        - DEGRADED
        - SILENT
        - NEVER_SEEN

    KioskSupervisionConfig:
      type: object
      description: |
        Configuration de supervision borne par agence (additif CONTRACT-013 / ADM-003).
        Défauts globaux surchargés par agence. Tolérance de skew heartbeat ±5 min côté serveur.
      additionalProperties: false
      properties:
        heartbeatIntervalSec:
          type: integer
          minimum: 5
          maximum: 3600
          default: 30
          description: Intervalle attendu entre deux heartbeats (secondes, défaut 30)
          example: 30
        silentThresholdSec:
          type: integer
          minimum: 30
          maximum: 86400
          default: 90
          description: Délai sans heartbeat au-delà duquel la borne est SILENT (secondes, défaut 90)
          example: 90

    KioskHeartbeatRequest:
      type: object
      description: Battement de cœur émis par une borne (additif CONTRACT-013 / ADM-003).
      additionalProperties: false
      required:
        - ts
      properties:
        ts:
          type: string
          format: date-time
          description: Horodatage UTC du heartbeat (tolérance de skew ±5 min)
          example: "2026-07-12T10:00:00Z"
        fw:
          type: string
          description: Version firmware de la borne (optionnel)
          example: "1.4.2"
        printerOk:
          type: boolean
          description: État de l'imprimante (optionnel)
          example: true
        queueDepth:
          type: integer
          minimum: 0
          description: Profondeur de file observée localement (optionnel)
          example: 7

    KioskSupervisionStatusEntry:
      type: object
      description: État de supervision d'une borne (additif CONTRACT-013 / ADM-003).
      additionalProperties: false
      required:
        - kioskId
        - agencyId
        - status
      properties:
        kioskId:
          type: string
          format: uuid
          example: "14141414-1414-4141-a141-141414141414"
        agencyId:
          type: string
          format: uuid
          example: "33333333-3333-4333-a333-333333333333"
        status:
          $ref: "#/components/schemas/KioskStatus"
        lastSeen:
          type: ["string", "null"]
          format: date-time
          description: Dernier heartbeat reçu (null si NEVER_SEEN)
          example: "2026-07-12T09:59:30Z"

    KioskSupervisionStatusResponse:
      type: object
      description: Liste des états de supervision des bornes (additif CONTRACT-013 / ADM-003).
      additionalProperties: false
      required:
        - kiosks
      properties:
        kiosks:
          type: array
          items:
            $ref: "#/components/schemas/KioskSupervisionStatusEntry"
