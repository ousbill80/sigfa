        "500":
          $ref: "./core.yaml#/components/responses/InternalServerError"

  /agencies/{id}/kiosks:provision:
    post:
      tags: [Onboarding]
      summary: Provisionner une borne (jeton d'enrôlement à usage unique)
      description: |
        Provisionne une borne pour l'agence et retourne un jeton d'enrôlement à usage
        unique (opaque, TTL court, jamais loggé) + l'URL/QR d'installation. L'échange
        du jeton contre les credentials borne échoue avec 401/403 opaque `KIOSK_ENROLLMENT_INVALID`.
        Additif CONTRACT-013 (ADM-002).
      x-tenant-scope: agency
      x-required-role: AGENCY_DIRECTOR
      parameters:
        - $ref: "./core.yaml#/components/parameters/IdParam"
